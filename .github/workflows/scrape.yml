name: Scrape & Validate Proxy Pool

on:
  schedule:
    - cron: '0 * * * *'        # every hour (unlimited for public repos)
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write             # needed to commit proxy files back to repo

jobs:
  update-pool:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache GeoLite2 databases
        uses: actions/cache@v4
        with:
          path: data/*.mmdb
          key: geolite2-${{ hashFiles('.github/workflows/scrape.yml') }}
          restore-keys: geolite2-

      - name: Download GeoLite2 databases
        continue-on-error: true
        run: |
          mkdir -p data
          # Skip download if cached databases exist
          if [ -f "data/GeoLite2-Country.mmdb" ] && [ -f "data/GeoLite2-ASN.mmdb" ]; then
            echo "GeoLite2 databases found in cache — skipping download"
            exit 0
          fi
          if [ -n "$MAXMIND_LICENSE_KEY" ]; then
            for EDITION in GeoLite2-Country GeoLite2-City GeoLite2-ASN; do
              curl -fsSL --retry 2 \
                "https://download.maxmind.com/app/geoip_download?edition_id=${EDITION}&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz" \
                -u "${MAXMIND_ACCOUNT_ID}:${MAXMIND_LICENSE_KEY}" \
                -o ${EDITION}.tar.gz || { echo "⚠ ${EDITION} download failed (rate limit?) — continuing"; continue; }
              tar -xzf ${EDITION}.tar.gz
              mv ${EDITION}_*/${EDITION}.mmdb data/${EDITION}.mmdb
              rm -rf ${EDITION}.tar.gz ${EDITION}_*/
              echo "✓ ${EDITION} downloaded"
            done
          else
            echo "MAXMIND_LICENSE_KEY not set — skipping GeoLite2 download"
          fi
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
          MAXMIND_ACCOUNT_ID: ${{ secrets.MAXMIND_ACCOUNT_ID }}

      - name: Run pipeline
        run: npm run pipeline
        env:
          NODE_ENV: production
          JUDGE_URL: ${{ secrets.JUDGE_URL }}
          JUDGE_TOKEN: ${{ secrets.JUDGE_TOKEN }}
          VALIDATOR_CONCURRENCY: '150'
          VALIDATOR_TIMEOUT_MS: '5000'
          SKIP_GOOGLE_PASS: 'false'
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
          CENSYS_API_ID: ${{ secrets.CENSYS_API_ID }}
          CENSYS_API_SECRET: ${{ secrets.CENSYS_API_SECRET }}

      - name: Commit updated proxy files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add proxies/ data/ README.md CHANGELOG.md

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # Generate commit message with stats
            HTTP_COUNT=$(wc -l < proxies/http.txt 2>/dev/null || echo 0)
            SOCKS4_COUNT=$(wc -l < proxies/socks4.txt 2>/dev/null || echo 0)
            SOCKS5_COUNT=$(wc -l < proxies/socks5.txt 2>/dev/null || echo 0)
            ELITE_COUNT=$(wc -l < proxies/elite.txt 2>/dev/null || echo 0)
            GPASS_COUNT=$(wc -l < proxies/google-pass.txt 2>/dev/null || echo 0)
            HIJACKED_COUNT=$(wc -l < proxies/hijacked.txt 2>/dev/null || echo 0)

            git commit -m "chore: update proxy pool [$(date -u +%Y-%m-%d)]

          http:         ${HTTP_COUNT} proxies
          socks4:       ${SOCKS4_COUNT} proxies
          socks5:       ${SOCKS5_COUNT} proxies
          elite:        ${ELITE_COUNT} proxies
          google-pass:  ${GPASS_COUNT} proxies
          hijacked:     ${HIJACKED_COUNT} proxies"

            git push
          fi
