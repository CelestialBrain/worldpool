# ─── Worldpool Explainer — nginx configuration ────────────────────────────────
# Serves the explainer page on port 80/443 and proxies /optout to the
# Node.js Worldpool API.
#
# Prerequisites:
#   - Replace YOUR_DOMAIN with the actual domain or public IP
#   - Adjust `proxy_pass` to point at the host/port running the Worldpool API
#   - For TLS: obtain a certificate (e.g. via certbot) and uncomment the HTTPS block

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Explainer static page
    root /var/www/worldpool-explainer;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /optout to the Node.js API
    location /optout {
        proxy_pass         http://127.0.0.1:3000/optout;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Limit body size — opt-out payloads are tiny
        client_max_body_size 4k;
    }
}

